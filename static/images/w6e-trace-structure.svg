<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="DejaVu Sans">
  <rect width="900" height="520" fill="#0b0f1e" rx="12"/>

  <!-- BEFORE -->
  <text x="40" y="48" font-size="20" font-weight="bold" fill="#f87171">BEFORE: one wrapping span</text>
  <text x="40" y="74" font-size="14" fill="#8a93b8">40 queries nested under a single eval_run span</text>

  <!-- before tree -->
  <g font-size="14">
    <rect x="40" y="92" width="360" height="34" rx="6" fill="#1c2138" stroke="#f87171" stroke-width="1.5"/>
    <text x="56" y="114" fill="#e6e9f5" font-weight="bold">eval_run</text>
    <text x="250" y="114" fill="#6b7299" font-size="12">1 trace</text>

    <rect x="80" y="138" width="320" height="30" rx="6" fill="#161a2e" stroke="#2a3150"/>
    <text x="96" y="158" fill="#c7cdee">main_rag_query  x40</text>

    <rect x="110" y="180" width="290" height="26" rx="6" fill="#12162a" stroke="#222845"/>
    <text x="126" y="198" fill="#9aa3c7" font-size="13">retrieval, generation ...</text>

    <text x="80" y="240" fill="#6b7299" font-size="13" font-style="italic">collapses to:</text>
    <text x="80" y="264" fill="#f87171" font-size="15" font-weight="bold">1 trace, 241 observations, 0 scores</text>
  </g>

  <!-- divider -->
  <line x1="450" y1="40" x2="450" y2="280" stroke="#222845" stroke-width="1"/>

  <!-- AFTER -->
  <text x="490" y="48" font-size="20" font-weight="bold" fill="#4ade80">AFTER: one trace per item</text>
  <text x="490" y="74" font-size="14" fill="#8a93b8">each item roots its own eval_item trace</text>

  <g font-size="14">
    <rect x="490" y="92" width="370" height="34" rx="6" fill="#1c2138" stroke="#4ade80" stroke-width="1.5"/>
    <text x="506" y="114" fill="#e6e9f5" font-weight="bold">eval_item</text>
    <text x="690" y="114" fill="#6b7299" font-size="12">1 of 120</text>

    <rect x="530" y="138" width="330" height="28" rx="6" fill="#161a2e" stroke="#2a3150"/>
    <text x="546" y="157" fill="#c7cdee">main_rag_query</text>

    <rect x="560" y="172" width="300" height="24" rx="6" fill="#12162a" stroke="#222845"/>
    <text x="576" y="189" fill="#9aa3c7" font-size="12">retrieval, generation</text>

    <rect x="530" y="202" width="330" height="24" rx="6" fill="#161a2e" stroke="#6366f1"/>
    <text x="546" y="219" fill="#a5b4fc" font-size="12">scorer_faithfulness  (score attached)</text>

    <rect x="530" y="230" width="330" height="24" rx="6" fill="#161a2e" stroke="#6366f1"/>
    <text x="546" y="247" fill="#a5b4fc" font-size="12">scorer_relevance  (score attached)</text>

    <rect x="530" y="258" width="330" height="24" rx="6" fill="#161a2e" stroke="#6366f1"/>
    <text x="546" y="275" fill="#a5b4fc" font-size="12">scorer_precision  (score attached)</text>
  </g>

  <!-- bottom result band -->
  <rect x="40" y="320" width="820" height="160" rx="10" fill="#101529" stroke="#222845"/>
  <text x="60" y="356" font-size="16" font-weight="bold" fill="#4ade80">After the fix, one eval run produced:</text>

  <g font-size="15" fill="#e6e9f5">
    <text x="60" y="396" font-weight="bold" font-size="30" fill="#818cf8">120</text>
    <text x="60" y="420" font-size="13" fill="#8a93b8">traces</text>

    <text x="260" y="396" font-weight="bold" font-size="30" fill="#818cf8">840</text>
    <text x="260" y="420" font-size="13" fill="#8a93b8">observations</text>

    <text x="500" y="396" font-weight="bold" font-size="30" fill="#818cf8">360</text>
    <text x="500" y="420" font-size="13" fill="#8a93b8">score objects</text>

    <text x="720" y="396" font-weight="bold" font-size="30" fill="#818cf8">$0.22</text>
    <text x="720" y="420" font-size="13" fill="#8a93b8">cost tracked</text>
  </g>
  <text x="60" y="458" font-size="13" fill="#6b7299">Cost and latency were captured automatically. Trace structure and score objects were design decisions.</text>
</svg>
